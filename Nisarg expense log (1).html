<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>निसर्ग रिसॉर्ट एक्सपेंस ॲप</title>
    
    <!-- Core React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Marathi:wght@100..900&display=swap');
        body { 
            font-family: 'Noto Sans Marathi', sans-serif; 
            margin: 0; padding: 0;
            background-color: #000000; 
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            background-color: #f8fafc; 
            min-height: 100vh;
        }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-label {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 2px;
            letter-spacing: 0.025em;
            line-height: 1.2;
        }
        .nav-active { color: #0f172a; }
        .nav-inactive { color: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Permanent SVG Icon Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Home: "M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10",
                PlusCircle: "M12 8v8 M8 12h8 M22 12A10 10 0 1 1 2 12a10 10 0 0 1 20 0z",
                List: "M8 6h13 M8 12h13 M8 18h13 M3 6h.01 M3 12h.01 M3 18h.01",
                Settings: "M12.22 2h-.44a2 2 0 0 0-2 2 2 2 0 0 1-2 2 2 2 0 0 0-2 2 2 2 0 0 1-2 2 2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2 2 2 0 0 1 2 2 2 2 0 0 0 2 2 2 2 0 0 1 2 2 2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2 2 2 0 0 1 2-2 2 2 0 0 0 2-2 2 2 0 0 1 2-2 2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2 2 2 0 0 1-2-2 2 2 0 0 0-2-2 2 2 0 0 1-2-2 2 2 0 0 0-2-2z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
                Cloud: "M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z",
                CloudOff: "M18.83 18.83A4 4 0 0 0 18 10h-1.26A8 8 0 0 0 7.05 6.05 M4.34 4.34l15.32 15.32 M1 1l22 22",
                RefreshCw: "M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0 0 20.49 15",
                ArrowDown: "M12 5v14 M19 12l-7 7-7-7",
                ArrowUp: "M12 19V5 M5 12l7-7 7 7",
                Trash: "M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2",
                Edit: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
                Sheet: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M8 13h8 M8 17h8",
                ExternalLink: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6 M15 3h6v6 M10 14L21 3",
                Table: "M3 3h18v18H3z M3 9h18 M3 15h18 M9 3v18 M15 3v18",
                ArrowLeft: "M19 12H5 M12 19l-7-7 7-7",
                Check: "M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4L12 14.01l-3-3",
                Alert: "M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01",
                User: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
                Shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
                Database: "M12 6c4.418 0 8-1.79 8-4s-3.582-4-8-4-8 1.79-8 4 3.582 4 8 4z M4 6v6c0 2.21 3.582 4 8 4s8-1.79 8-4V6 M4 12v6c0 2.21 3.582 4 8 4s8-1.79 8-4v-6"
            };

            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={icons[name] || ""} />
                </svg>
            );
        };

        // --- Configuration ---
        const HARDCODED_SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/1clGHk-Bl1GlNqKg7ciGDpY7FOdJimSA0DguXU0lW5gw/edit?usp=sharing";
        const appId = 'nisarg-resort-app-v2'; 
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};

        // --- Utils ---
        const formatCurrency = (amount) => {
            const val = Number(amount) || 0;
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val);
        };
        
        const formatDateMarathi = (dateStr) => {
            if (!dateStr) return '—';
            try {
                const dateObj = new Date(dateStr);
                if (isNaN(dateObj.getTime())) return dateStr;
                const days = ['रविवार', 'सोमवार', 'मंगळवार', 'बुधवार', 'गुरुवार', 'शुक्रवार', 'शनिवार'];
                return `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${dateObj.getFullYear()} (${days[dateObj.getDay()]})`;
            } catch (e) { return dateStr; }
        };

        // --- Components ---

        function ActionModal({ isOpen, onClose, onConfirm, title, message, type = 'success', stats }) {
            if (!isOpen) return null;
            const isConfirm = type === 'confirm';
            return (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md font-sans text-left">
                    <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm p-8 text-center border border-slate-100 animate-in">
                        <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${type === 'success' ? 'bg-emerald-100 text-emerald-600' : isConfirm ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'}`}>
                            <Icon name={type === 'success' ? "Check" : isConfirm ? "Trash" : "Alert"} size={32} />
                        </div>
                        <h2 className="text-xl font-bold text-slate-900 mb-2 font-sans">{title || "सूचना"}</h2>
                        <div className="text-slate-500 font-medium mb-6 text-sm">
                            {message || ""}
                            {stats && (
                                <div className="mt-4 bg-slate-50 rounded-xl p-3 text-xs space-y-1 text-left border border-slate-100 font-sans">
                                    <div className="flex justify-between"><span>एकूण नोंदी:</span> <span className="font-bold text-slate-800">{stats.sheetCount}</span></div>
                                    <div className="flex justify-between pt-1 border-t border-slate-200 text-emerald-600 font-bold"><span>नवीन जोडल्या:</span> <span>+{stats.addedCount}</span></div>
                                </div>
                            )}
                        </div>
                        <div className="flex flex-col gap-2">
                            {isConfirm ? (
                                <><button onClick={onConfirm} className="w-full bg-red-600 text-white py-3 rounded-xl font-bold uppercase active:scale-95">हो, हटवा</button>
                                <button onClick={onClose} className="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold uppercase active:scale-95">रद्द करा</button></>
                            ) : (
                                <button onClick={onClose} className="w-full bg-slate-900 text-white py-3 rounded-xl font-bold uppercase active:scale-95">ठीक आहे</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function InitSyncModal({ isOpen, onSync, onSkip, isPulling, dbStatus }) {
            if (!isOpen) return null;
            const isReady = dbStatus === 'connected';
            return (
                <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md font-sans text-left">
                    <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm p-8 text-center border border-slate-100 animate-in font-bold">
                        <div className="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-emerald-50 text-emerald-600">
                            <Icon name="RefreshCw" size={32} className={(isPulling || !isReady) ? "animate-spin" : ""} />
                        </div>
                        <h2 className="text-xl font-black text-slate-900 mb-2 font-sans">डेटा सिंक</h2>
                        <p className="text-slate-500 font-medium mb-6 text-sm font-sans">
                            क्लाउड स्प्रेडशीटमधील नवीन नोंदी ॲपमध्ये सिंक करायच्या आहेत का?
                        </p>
                        <div className="flex flex-col gap-3 font-sans">
                            <button onClick={onSync} disabled={isPulling || !isReady} className="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                                {isPulling ? 'सिंक होत आहे...' : (!isReady ? 'लोड होत आहे...' : 'सिंक करा')}
                            </button>
                            <button onClick={onSkip} disabled={isPulling} className="w-full bg-slate-100 text-slate-600 py-3.5 rounded-xl font-black uppercase tracking-widest active:scale-95 transition-all">
                                नंतर करा (SKIP)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function DashboardView({ stats, setActiveTab, dbStatus, openingBalanceConfig, sheetDirectUrl }) {
            return (
                <div className="space-y-6 pb-4 animate-in font-sans">
                    <div className={`w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-full text-[10px] font-bold tracking-widest uppercase border ${dbStatus === 'connected' ? 'bg-emerald-50 text-emerald-700 border-emerald-100 shadow-sm' : dbStatus === 'error' ? 'bg-red-50 text-red-700 border-red-100' : 'bg-amber-50 text-amber-700 border-amber-100 animate-pulse'}`}>
                        <Icon name={dbStatus === 'connected' ? "Cloud" : "RefreshCw"} size={14} className={dbStatus !== 'connected' ? "animate-spin" : ""} />
                        {dbStatus === 'connected' ? 'सिस्टम सुरक्षित जोडलेली आहे' : 'सर्व्हरशी संपर्क होत आहे...'}
                    </div>
                    
                    <div className="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200/50 font-sans">
                        <div className="p-6 border-b border-slate-50 text-left font-bold">
                            <h3 className="text-slate-400 text-[10px] uppercase tracking-widest mb-4 italic">आर्थिक स्थिती अहवाल</h3>
                            <div className="space-y-4 text-sm font-sans">
                                <div className="flex justify-between items-center"><span className="text-slate-500 italic">ओपनिंग बॅलन्स ({openingBalanceConfig.date || "..."})</span><span className="text-slate-900 font-bold">{formatCurrency(openingBalanceConfig.amount)}</span></div>
                                <div className="flex justify-between items-center"><span className="text-slate-500 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> एकूण जमा</span><span className="text-emerald-600 font-bold">{formatCurrency(stats.totalReceived)}</span></div>
                                <div className="flex justify-between items-center"><span className="text-slate-500 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-red-500"></div> एकूण खर्च</span><span className="text-red-600 font-bold">{formatCurrency(stats.totalSpent)}</span></div>
                            </div>
                        </div>
                        <div className="bg-slate-900 p-6 flex justify-between items-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full -mr-16 -mt-16 blur-3xl opacity-50 font-sans"></div>
                            <div className="relative z-10 text-left font-sans">
                                <p className="text-slate-400 text-[9px] uppercase tracking-widest font-bold">NET BALANCE</p>
                                <h2 className="text-white text-3xl font-black mt-1 tracking-tight font-sans">{formatCurrency(stats.remainingAmount)}</h2>
                            </div>
                            <div className="bg-white/10 p-3 rounded-2xl border border-white/5 backdrop-blur-md relative z-10 font-sans"><Icon name="Sheet" size={28} className="text-emerald-400" /></div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 pt-2">
                        <button onClick={() => setActiveTab('addExpense')} className="group bg-white border border-slate-200 p-6 rounded-[2rem] flex flex-col items-center gap-3 shadow-sm active:scale-95 transition-all">
                            <div className="bg-slate-50 text-slate-400 p-4 rounded-2xl group-hover:bg-red-500 group-hover:text-white transition-all shadow-inner"><Icon name="ArrowUp" size={24} /></div>
                            <span className="text-slate-900 font-bold text-xs uppercase tracking-wider">खर्च नोंदवा</span>
                        </button>
                        <button onClick={() => setActiveTab('addReceipt')} className="group bg-white border border-slate-200 p-6 rounded-[2rem] flex flex-col items-center gap-3 shadow-sm active:scale-95 transition-all">
                            <div className="bg-slate-50 text-slate-400 p-4 rounded-2xl group-hover:bg-emerald-500 group-hover:text-white transition-all shadow-inner"><Icon name="ArrowDown" size={24} /></div>
                            <span className="text-slate-900 font-bold text-xs uppercase tracking-wider">जमा नोंदवा</span>
                        </button>
                    </div>

                    <div className="space-y-3 pt-2">
                        <button onClick={() => setActiveTab('spreadsheet')} className="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] flex items-center justify-center gap-3 font-bold text-xs uppercase tracking-widest shadow-xl active:scale-[0.98]">
                            <Icon name="Table" size={20} /> मॅट्रिक्स व्ह्यू उघडा
                        </button>
                        <button onClick={() => window.open(sheetDirectUrl, '_blank')} className="w-full bg-emerald-600 text-white py-5 rounded-[1.5rem] flex flex-col items-center justify-center gap-1 font-bold text-xs uppercase tracking-widest shadow-xl active:scale-[0.98] border-b-4 border-emerald-800">
                            <div className="flex items-center gap-2 font-sans"><Icon name="ExternalLink" size={20} /> थेट स्प्रेडशीट उघडा</div>
                            <span className="text-[8px] opacity-70 tracking-widest font-sans">(OPEN IN NEW TAB)</span>
                        </button>
                    </div>
                </div>
            );
        }

        // --- Main App Implementation ---
        function App() {
            const [user, setUser] = useState(null);
            const [dbStatus, setDbStatus] = useState('connecting'); 
            const [activeTab, setActiveTab] = useState('dashboard');
            const [openingBalanceConfig, setOpeningBalanceConfig] = useState({ amount: 5200, date: '2026-04-01' });
            const [transactions, setTransactions] = useState([]);
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [editingEntry, setEditingEntry] = useState(null);
            const [enteredBy, setEnteredBy] = useState('');
            const [isPulling, setIsPulling] = useState(false);
            const [modal, setModal] = useState({ open: false, title: '', message: '', type: 'success', stats: null });
            const [showInitSync, setShowInitSync] = useState(true);
            
            const [departments, setDepartments] = useState(['Nisarg Villas', 'JCB', 'Tractor', 'Crane']);
            const [machineryTypes, setMachineryTypes] = useState(['JCB', 'Tractor', 'Crane']);
            const [newDeptName, setNewDeptName] = useState('');
            const [isNewMach, setIsNewMach] = useState(false);
            const [googleSheetUrl, setGoogleSheetUrl] = useState('https://script.google.com/macros/s/AKfycbwZGBVq9RmUoWaU3ZqNdxh-H5od50WSyz4CTaQoTdi1RDiFkIKOSRwGvhZ98prNVEXltA/exec');

            const [expenseForm, setExpenseForm] = useState({ date: new Date().toISOString().split('T')[0], voucherNo: '', particulars: '', department: 'Nisarg Villas', amount: '' });
            const [receiptForm, setReceiptForm] = useState({ date: new Date().toISOString().split('T')[0], receivedFrom: '', amount: '' });

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                auth.onAuthStateChanged(async (u) => {
                    if (!u) {
                        try { await auth.signInAnonymously(); } catch (e) { setDbStatus('error'); }
                    } else {
                        setUser(u);
                    }
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const db = firebase.firestore();
                const unsubS = db.doc(`artifacts/${appId}/users/${user.uid}/appData/settings`).onSnapshot(snap => {
                    if (snap.exists) {
                        const d = snap.data();
                        if (d.departments) setDepartments(d.departments);
                        if (d.machineryTypes) setMachineryTypes(d.machineryTypes);
                        if (d.googleSheetUrl) setGoogleSheetUrl(d.googleSheetUrl);
                        if (d.enteredBy) setEnteredBy(d.enteredBy);
                        if (d.openingBalanceConfig) setOpeningBalanceConfig(d.openingBalanceConfig);
                    }
                    setDbStatus('connected');
                }, () => setDbStatus('error'));

                const unsubT = db.collection(`artifacts/${appId}/users/${user.uid}/transactions`).onSnapshot(snap => {
                    const txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    txs.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    setTransactions(txs);
                }, () => setDbStatus('error'));

                return () => { unsubS(); unsubT(); };
            }, [user]);

            const stats = useMemo(() => {
                let rec = 0, spent = 0;
                transactions.forEach(t => { if (t.type === 'receipt') rec += Number(t.amount || 0); else spent += Number(t.amount || 0); });
                return { totalReceived: rec, totalSpent: spent, remainingAmount: (Number(openingBalanceConfig.amount) || 0) + rec - spent };
            }, [transactions, openingBalanceConfig.amount]);

            const syncToSheet = async (data) => {
                if (!googleSheetUrl || !googleSheetUrl.includes('script.google.com')) return;
                try { await fetch(googleSheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ transactions: data }), headers: { 'Content-Type': 'text/plain' } }); } catch (e) {}
            };

            const pullFromSheet = async (silent = false) => {
                if (!googleSheetUrl || !googleSheetUrl.includes('script.google.com')) return;
                if (!silent) setIsPulling(true);
                try {
                    const res = await fetch(googleSheetUrl);
                    const d = await res.json();
                    if (d.status === 'success' && d.transactions) {
                        const createHash = (t) => {
                            const dt = t.date ? new Date(t.date).toISOString().split('T')[0] : '';
                            return `${dt}|${String(t.voucherNo || '').trim()}|${String(t.particulars || '').trim().toLowerCase()}|${Number(t.amount || 0).toFixed(2)}`;
                        };
                        const existingHashes = new Set(transactions.map(createHash));
                        let added = 0;
                        const db = firebase.firestore();
                        for (const t of d.transactions) {
                            if (!existingHashes.has(createHash(t))) {
                                await db.collection(`artifacts/${appId}/users/${user.uid}/transactions`).add({ ...t, createdAt: Date.now() - (added * 100) });
                                added++;
                            }
                        }
                        if (!silent) {
                            if (added > 0) {
                                setModal({ open: true, title: 'सिंक पूर्ण!', message: 'नव्या नोंदी प्राप्त झाल्या.', type: 'success', stats: { sheetCount: d.transactions.length, addedCount: added } });
                            } else {
                                setModal({ open: true, title: 'सिंक पूर्ण!', message: 'सर्व डेटा आधीच सिंक आहे.', type: 'success' });
                            }
                        }
                    }
                } catch (e) { console.error("Pull Error", e); } finally { setIsPulling(false); }
            };

            // Auto-load from sheet when entering Matrix tab
            useEffect(() => {
                if (activeTab === 'spreadsheet') pullFromSheet(true);
            }, [activeTab]);

            const handleInitialSync = async () => {
                await pullFromSheet(false);
                setShowInitSync(false);
            };

            const saveSettings = async (updates) => {
                if (!user) return;
                await firebase.firestore().doc(`artifacts/${appId}/users/${user.uid}/appData/settings`).set(updates, { merge: true });
            };

            const handleSaveEntry = async (e, type) => {
                e.preventDefault();
                if (!user) return;
                const db = firebase.firestore();
                const entryData = type === 'expense' 
                    ? { ...expenseForm, type: 'expense', amount: Number(expenseForm.amount), enteredBy } 
                    : { particulars: receiptForm.receivedFrom, receivedFrom: receiptForm.receivedFrom, amount: Number(receiptForm.amount), date: receiptForm.date, type: 'receipt', enteredBy };
                
                if (editingEntry) {
                    await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${editingEntry.id}`).update(entryData);
                    setEditingEntry(null);
                    setModal({ open: true, title: 'बदल यशस्वी!', message: 'नोंद अपडेट झाली.', type: 'success' });
                } else {
                    await db.collection(`artifacts/${appId}/users/${user.uid}/transactions`).add({ ...entryData, createdAt: Date.now() });
                }
                syncToSheet(transactions);
                setExpenseForm({ date: new Date().toISOString().split('T')[0], voucherNo: '', particulars: '', department: 'Nisarg Villas', amount: '' });
                setReceiptForm({ date: new Date().toISOString().split('T')[0], receivedFrom: '', amount: '' });
                setActiveTab('dashboard');
            };

            const toggleSelect = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id); else newSet.add(id);
                setSelectedIds(newSet);
            };

            const executeBulkDelete = async () => {
                if (!user) return;
                const db = firebase.firestore();
                const batch = db.batch();
                selectedIds.forEach(id => batch.delete(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${id}`)));
                await batch.commit();
                syncToSheet(transactions.filter(t => !selectedIds.has(t.id)));
                setSelectedIds(new Set());
                setModal({ open: false });
            };

            return (
                <div className="app-container flex flex-col font-sans overflow-x-hidden text-slate-900">
                    <InitSyncModal 
                        isOpen={showInitSync} 
                        onSync={handleInitialSync} 
                        onSkip={() => setShowInitSync(false)} 
                        isPulling={isPulling}
                        dbStatus={dbStatus}
                    />

                    <ActionModal 
                        isOpen={modal.open} onClose={() => setModal({open: false})} onConfirm={executeBulkDelete}
                        title={modal.title} message={modal.message} type={modal.type} stats={modal.stats}
                    />

                    {/* Logo Header adapted to Black background */}
                    <header className="bg-black text-white pt-8 pb-4 shadow-2xl sticky top-0 z-50 flex flex-col items-center border-b border-white/10">
                        <img 
                            src="Nisarg Resort White Logo.jpg" 
                            alt="Nisarg Resort" 
                            className="h-24 w-auto object-contain px-4" 
                            onError={(e) => { e.target.style.display='none'; }}
                        />
                        <div className="h-1 w-20 bg-orange-600 rounded-full mt-3 opacity-80"></div>
                    </header>

                    <main className="flex-1 container mx-auto px-5 py-8 max-w-2xl text-left pb-32">
                        {activeTab !== 'dashboard' && activeTab !== 'spreadsheet' && (
                            <div className="mb-6 bg-slate-900 text-white rounded-[2rem] p-6 flex justify-between items-center shadow-2xl animate-in font-bold font-sans">
                                <div className="flex flex-col font-sans text-left">
                                    <span className="text-[10px] font-bold uppercase text-slate-500 tracking-widest">शिल्लक रक्कम</span>
                                    <div className="text-2xl font-black text-emerald-400 tracking-tight">{formatCurrency(stats.remainingAmount)}</div>
                                </div>
                                <div className="h-10 w-10 bg-white/10 rounded-xl flex items-center justify-center cursor-pointer active:scale-90" onClick={() => { setActiveTab('dashboard'); setEditingEntry(null); }}>
                                    <Icon name="ArrowLeft" size={20} className="text-white/60" />
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && <DashboardView stats={stats} setActiveTab={setActiveTab} dbStatus={dbStatus} openingBalanceConfig={openingBalanceConfig} sheetDirectUrl={HARDCODED_SPREADSHEET_URL} />}
                        
                        {(activeTab === 'addExpense' || activeTab === 'addReceipt') && (
                            <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 p-8 space-y-8 animate-in pb-16 text-left font-bold font-sans">
                                <h2 className="text-xl font-bold text-slate-900 font-sans">{activeTab === 'addExpense' ? (editingEntry ? 'नोंद सुधारा' : 'खर्च नोंदणी') : (editingEntry ? 'नोंद सुधारा' : 'जमा नोंदणी')}</h2>
                                <form onSubmit={(e) => handleSaveEntry(e, activeTab === 'addExpense' ? 'expense' : 'receipt')} className="space-y-6 font-sans">
                                    <div className="bg-slate-50 p-4 rounded-xl flex items-center gap-3 border border-slate-100 font-bold">
                                        <Icon name="User" size={20} className="text-slate-400" />
                                        <input type="text" className="flex-1 bg-transparent border-none outline-none text-sm font-bold text-slate-900 font-sans" value={enteredBy || ""} onChange={e => setEnteredBy(e.target.value)} placeholder="तुमचे नाव" required />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 font-sans text-left">
                                        <div className="space-y-1.5 font-sans"><label className="text-[9px] font-black uppercase ml-2 block">तारीख</label><input type="date" required className="w-full p-4 border border-slate-200 rounded-2xl text-sm font-bold bg-white focus:ring-2 ring-slate-900 outline-none" value={(activeTab === 'addExpense' ? expenseForm.date : receiptForm.date) || ""} onChange={e => activeTab === 'addExpense' ? setExpenseForm({...expenseForm, date: e.target.value}) : setReceiptForm({...receiptForm, date: e.target.value})} /></div>
                                        {activeTab === 'addExpense' && <div className="space-y-1.5 font-sans"><label className="text-[9px] font-black uppercase ml-2 block font-sans">व्हाऊचर नं.</label><input type="text" className="w-full p-4 border border-slate-200 rounded-2xl text-sm font-bold bg-white focus:ring-2 ring-slate-900 outline-none" value={expenseForm.voucherNo || ""} onChange={e => setExpenseForm({...expenseForm, voucherNo: e.target.value})} placeholder="#000" /></div>}
                                    </div>
                                    <div className="space-y-1.5 font-bold text-left font-sans font-black"><label className="text-[9px] font-black uppercase ml-2 block font-sans">{activeTab === 'addExpense' ? 'तपशील' : 'कोणाकडून मिळाले?'}</label><input type="text" required className="w-full p-4 border border-slate-200 rounded-2xl text-sm font-bold bg-white outline-none focus:ring-2 ring-slate-900" value={(activeTab === 'addExpense' ? expenseForm.particulars : receiptForm.receivedFrom) || ""} onChange={e => activeTab === 'addExpense' ? setExpenseForm({...expenseForm, particulars: e.target.value}) : setReceiptForm({...receiptForm, receivedFrom: e.target.value})} placeholder="..." /></div>
                                    <div className="pt-2 font-sans font-black font-sans"><label className="block text-[11px] font-black text-slate-400 uppercase text-center mb-2 tracking-widest font-sans">रक्कम (INR)</label><input type="number" required className={`w-full p-7 border-2 ${activeTab === 'addExpense' ? 'border-slate-900' : 'border-emerald-600 text-emerald-600'} rounded-[2.5rem] text-5xl font-black bg-white shadow-inner text-center outline-none focus:ring-8 focus:ring-slate-50 font-sans`} value={(activeTab === 'addExpense' ? expenseForm.amount : receiptForm.amount) || ""} onChange={e => activeTab === 'addExpense' ? setExpenseForm({...expenseForm, amount: e.target.value}) : setReceiptForm({...receiptForm, amount: e.target.value})} placeholder="0" /></div>
                                    <button type="submit" className={`w-full ${activeTab === 'addExpense' ? 'bg-slate-900' : 'bg-emerald-600'} text-white font-black py-5 rounded-[2rem] shadow-xl uppercase tracking-widest text-xs active:scale-95 transition-all mt-4 font-sans`}>जतन करा</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-5 animate-in pb-16 text-left font-sans font-bold font-sans">
                                <div className="flex justify-between items-center px-2 text-left">
                                    <div className="text-left font-bold italic font-sans font-black"><h2 className="text-xl font-bold text-slate-900 uppercase font-black font-sans">व्यवहार वही</h2><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 font-sans">Registry History</p></div>
                                    {selectedIds.size > 0 && <button onClick={() => setModal({ open: true, title: 'हटवायचे?', message: `${selectedIds.size} नोंदी कायमच्या हटवायच्या का?`, type: 'confirm' })} className="bg-red-600 text-white px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-xl flex items-center gap-2 animate-bounce font-sans"><Icon name="Trash" size={16} /> हटवा</button>}
                                </div>
                                <div className="space-y-4 pt-2 font-sans font-black">
                                    {transactions.map(t => (
                                        <div key={t.id} className={`bg-white p-6 rounded-3xl shadow-sm border flex items-center gap-4 transition-all ${selectedIds.has(t.id) ? 'border-red-500 bg-red-50/20 shadow-lg' : 'border-slate-100'}`}>
                                            <input type="checkbox" checked={selectedIds.has(t.id)} onChange={() => toggleSelect(t.id)} className="w-6 h-6 rounded-lg accent-red-600 cursor-pointer" />
                                            <div className="flex-1 min-w-0 font-sans font-bold text-left"><div className="flex items-center gap-2 mb-2 flex-wrap font-sans font-bold text-left"><span className="text-[8px] text-slate-400 uppercase tracking-tighter px-2 py-0.5 bg-slate-50 rounded-full border border-slate-100 font-sans font-bold text-left font-sans font-black">{formatDateMarathi(t.date)}</span></div><div className="font-black text-slate-800 text-base truncate text-left font-sans font-black">{String(t.particulars || "")}</div><div className="text-[10px] text-slate-400 italic text-left font-black font-sans font-black">By: {String(t.enteredBy || 'Admin')}</div></div>
                                            <div className="text-right flex flex-col items-end gap-3 font-sans font-bold font-sans font-black"><div className={`font-black text-lg ${t.type === 'receipt' ? 'text-emerald-600' : 'text-red-600'}`}>{t.type === 'receipt' ? '+' : '-'}{formatCurrency(t.amount)}</div>
                                                <button onClick={() => { setEditingEntry(t); if(t.type === 'expense') { setExpenseForm({...t}); setActiveTab('addExpense'); } else { setReceiptForm({date: t.date, receivedFrom: t.particulars, amount: t.amount}); setActiveTab('addReceipt'); } }} className="p-2 text-slate-400 hover:text-slate-900 bg-slate-50 rounded-xl shadow-sm font-sans font-bold"><Icon name="Edit" size={18} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'spreadsheet' && (
                            <div className="bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden flex flex-col h-[75vh] animate-in zoom-in-95 font-sans font-bold">
                                <div className="bg-slate-950 p-6 flex justify-between items-center shrink-0 font-sans font-black">
                                    <button onClick={() => setActiveTab('dashboard')} className="flex items-center gap-2 font-black text-[10px] text-white uppercase tracking-widest"><Icon name="ArrowLeft" size={18} /> डॅशबोर्ड</button>
                                    <button onClick={() => pullFromSheet()} disabled={isPulling} className="bg-emerald-500 text-white px-5 py-2 rounded-xl text-[10px] font-bold flex items-center gap-2"><Icon name="RefreshCw" size={14} className={isPulling ? "animate-spin" : ""} /> सिंक करा</button>
                                </div>
                                <div className="overflow-auto flex-1 pb-24 text-left font-bold font-sans">
                                    <table className="w-full text-[10px] border-collapse min-w-[850px] font-sans font-black">
                                        <thead className="bg-slate-50 sticky top-0 border-b border-slate-200 z-10 font-sans font-black"><tr><th className="p-5 text-left font-black text-slate-400 uppercase tracking-widest border-r">तारीख आणि वार</th><th className="p-5 text-left font-black text-slate-400 uppercase tracking-widest border-r font-sans">व्हाऊचर</th><th className="p-5 text-left font-black text-slate-400 uppercase tracking-widest border-r font-sans">तपशील</th><th className="p-5 text-left font-black text-slate-400 uppercase tracking-widest border-r font-sans">विभाग</th><th className="p-5 text-right font-black text-slate-400 uppercase tracking-widest font-sans">रक्कम (INR)</th></tr></thead>
                                        <tbody className="divide-y divide-slate-100 font-bold font-sans font-black">
                                            {transactions.map(t => (
                                                <tr key={t.id} className="hover:bg-slate-50 transition-colors font-sans font-bold font-black">
                                                    <td className="p-5 font-bold text-slate-600 border-r text-left font-black">{formatDateMarathi(t.date)}</td>
                                                    <td className="p-5 font-bold text-slate-400 border-r text-left font-black">{String(t.voucherNo || '—')}</td>
                                                    <td className="p-5 font-black text-slate-900 border-r text-left font-black">{String(t.particulars)}</td>
                                                    <td className="p-5 border-r font-sans font-bold font-sans font-bold text-left font-black font-sans font-black"><span className="bg-slate-100 px-3 py-1.5 rounded-xl text-slate-600 font-black text-[9px] uppercase tracking-tighter">{String(t.department || "")}</span></td>
                                                    <td className={`p-5 text-right font-black text-base ${t.type === 'receipt' ? 'text-emerald-600' : 'text-slate-900'} font-black`}>{formatCurrency(t.amount)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'settings' && (
                            <div className="space-y-8 pb-32 animate-in text-left font-sans font-bold font-black">
                                {/* विभाग व्यवस्थापन */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 font-sans font-black">
                                    <h2 className="text-lg font-black text-slate-900 uppercase mb-6 border-b border-slate-50 pb-4 flex items-center gap-3 italic font-sans font-black font-black"><Icon name="Database" size={22} className="text-slate-400" /> विभाग व्यवस्थापन</h2>
                                    <div className="space-y-5 font-sans font-black">
                                        <div className="flex gap-3 font-sans font-black font-black font-black"><input type="text" className="flex-1 p-4 border border-slate-200 rounded-2xl text-sm font-bold bg-slate-50 focus:bg-white outline-none focus:ring-2 ring-slate-900 font-sans" value={newDeptName} onChange={e => setNewDeptName(e.target.value)} placeholder="नवीन विभाग" /><button onClick={async () => { if(newDeptName){ await saveSettings({ departments: [...departments, newDeptName.trim()], machineryTypes: isNewMach ? [...machineryTypes, newDeptName.trim()] : machineryTypes }); setNewDeptName(''); } }} className="bg-slate-900 text-white px-8 rounded-2xl font-black text-xs uppercase shadow-xl font-black">जोडा</button></div>
                                        <label className="flex items-center gap-4 text-[10px] text-slate-600 font-black uppercase tracking-widest bg-slate-50 p-4 rounded-xl cursor-pointer border border-slate-100 hover:bg-slate-100 transition-colors font-sans font-black font-black"><input type="checkbox" checked={isNewMach} onChange={e => setIsNewMach(e.target.checked)} className="w-6 h-6 rounded-lg border-slate-300 text-slate-900 focus:ring-slate-900 shadow-sm" /> मशिनरी ट्रॅकिंग सुरू करा</label>
                                    </div>
                                    <div className="flex flex-wrap gap-2 mt-8 font-sans font-black font-black font-black">
                                        {departments.map(d => (
                                            <div key={d} className="bg-white border border-slate-200 px-4 py-3 rounded-2xl text-[10px] font-black flex items-center gap-5 uppercase tracking-tighter shadow-sm font-black font-black font-black"><span className="opacity-70 font-black font-black">{d}</span><button onClick={async () => { if(confirm('हा विभाग हटवायचा?')) await saveSettings({ departments: departments.filter(x => x !== d), machineryTypes: machineryTypes.filter(x => x !== d) }); }} className="text-slate-300 hover:text-red-500 transition-colors font-bold font-sans font-black"><Icon name="Trash" size={16} /></button></div>
                                        ))}
                                    </div>
                                </div>

                                {/* सिस्टम सेटिंग्ज */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 font-sans font-black font-black">
                                    <h2 className="text-lg font-black text-slate-900 uppercase mb-6 border-b border-slate-50 pb-4 flex items-center gap-3 italic font-sans font-black font-black"><Icon name="Shield" size={22} className="text-slate-400" /> सिस्टम सेटिंग्ज</h2>
                                    <div className="space-y-6 font-black font-sans font-black font-black font-black">
                                        <div className="grid grid-cols-2 gap-5 font-sans font-black font-black font-black font-black"><div className="space-y-2 text-left font-bold font-sans font-black font-black font-black font-black font-black font-black"><label className="text-[10px] font-black text-slate-400 uppercase ml-2 block font-bold font-black">ओपनिंग तारीख</label><input type="date" className="w-full p-4 border border-slate-200 rounded-2xl text-sm font-bold bg-slate-50 outline-none focus:ring-2 ring-slate-900 font-bold" value={openingBalanceConfig.date || ""} onChange={e => setOpeningBalanceConfig({...openingBalanceConfig, date: e.target.value})} /></div><div className="space-y-2 text-left font-bold font-sans font-black font-black font-black font-black font-black font-black font-black font-black"><label className="text-[10px] font-black text-slate-400 uppercase ml-2 block font-bold font-black">ओपनिंग रक्कम</label><input type="number" className="w-full p-4 border border-slate-200 rounded-2xl text-sm font-bold bg-slate-50 outline-none focus:ring-2 ring-slate-900 font-bold" value={openingBalanceConfig.amount || 0} onChange={e => setOpeningBalanceConfig({...openingBalanceConfig, amount: Number(e.target.value)})} /></div></div>
                                        <div className="space-y-2 text-left italic font-sans font-black font-black font-black font-black font-black font-black font-black font-black font-black"><label className="text-[10px] font-black text-slate-400 uppercase ml-2 block font-sans font-black font-black">Google Script URL</label><input type="text" className="w-full p-4 border border-slate-200 rounded-2xl text-[10px] font-bold bg-slate-50 text-slate-500 outline-none font-bold font-mono" value={googleSheetUrl || ""} onChange={e => setGoogleSheetUrl(e.target.value)} /></div>
                                        <button onClick={async () => { await saveSettings({ openingBalanceConfig, googleSheetUrl }); setModal({ open: true, title: 'जतन!', message: 'सेटिंग अपडेट झाली.', type: 'success' }); }} className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-[11px] uppercase tracking-widest active:scale-95 shadow-2xl hover:bg-black font-sans font-black">सर्व अपडेट करा</button>
                                    </div>
                                </div>

                                {/* Danger Zone */}
                                <div className="bg-red-50 p-7 rounded-[2.5rem] border border-red-100 text-left font-black font-black font-black font-black">
                                    <h2 className="text-base font-black text-red-900 uppercase tracking-widest mb-3 italic font-black font-black">Danger Zone</h2>
                                    <p className="text-[11px] text-red-700 font-medium mb-5 leading-relaxed font-black font-black">येथे क्लिक केल्यास सर्व व्यवहार आणि डेटा कायमचा हटवला जाईल.</p>
                                    <button onClick={async () => { if (!confirm('सावधान! पूर्ण डेटा हटवल्यास परत मिळणार नाही. खात्री आहे?')) return; const db = firebase.firestore(); const batch = db.batch(); transactions.forEach(t => batch.delete(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`))); await batch.commit(); setModal({ open: true, title: 'रीसेट पूर्ण!', message: 'सर्व डेटा हटवण्यात आला आहे.', type: 'warning' }); }} className="w-full bg-white border-2 border-red-600 text-red-600 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95 shadow-lg hover:bg-red-600 hover:text-white font-black font-black font-black">पूर्ण डेटा हटवा (RESET)</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar - labels font size 13px */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] max-w-md bg-white/95 border border-slate-200/50 flex justify-around p-3 rounded-[3.5rem] shadow-2xl z-[70] backdrop-blur-xl ring-1 ring-black/5 font-bold font-sans">
                        
                        <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center w-16 transition-all ${activeTab==='dashboard'?'nav-active scale-105':'nav-inactive'}`}>
                            <div className={`${activeTab==='dashboard'?'bg-slate-950 text-white p-3 rounded-2xl shadow-xl':'p-2'}`}><Icon name="Home" size={24} /></div>
                            <span className="nav-label">मुख्य</span>
                        </button>
                        
                        <button onClick={()=>setActiveTab('addExpense')} className={`flex flex-col items-center w-16 transition-all ${activeTab==='addExpense'||activeTab==='addReceipt'?'nav-active scale-105':'nav-inactive'}`}>
                            <div className={`${activeTab==='addExpense'||activeTab==='addReceipt'?'bg-slate-950 text-white p-3 rounded-2xl shadow-xl':'p-2'}`}><Icon name="PlusCircle" size={24} /></div>
                            <span className="nav-label">नोंदणी</span>
                        </button>
                        
                        <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center w-16 transition-all ${activeTab==='history'?'nav-active scale-105':'nav-inactive'}`}>
                            <div className={`${activeTab==='history'?'bg-slate-950 text-white p-3 rounded-2xl shadow-xl':'p-2'}`}><Icon name="List" size={24} /></div>
                            <span className="nav-label">वही</span>
                        </button>
                        
                        <button onClick={()=>setActiveTab('settings')} className={`flex flex-col items-center w-16 transition-all ${activeTab==='settings'?'nav-active scale-105':'nav-inactive'}`}>
                            <div className={`${activeTab==='settings'?'bg-slate-950 text-white p-3 rounded-2xl shadow-xl':'p-2'}`}><Icon name="Settings" size={24} /></div>
                            <span className="nav-label">सेटिंग</span>
                        </button>
                        
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
