<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>निसर्ग रिसॉर्ट एक्सपेंस ॲप</title>
    
    <!-- React & ReactDOM Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Marathi:wght@100..900&display=swap');
        body { 
            font-family: 'Noto Sans Marathi', sans-serif; 
            margin: 0; padding: 0;
            background-color: #000000; 
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            background-color: #f8fafc; 
            min-height: 100vh;
        }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-label {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 2px;
            letter-spacing: 0.025em;
            line-height: 1.2;
        }
        .nav-active { color: #0f172a; }
        .nav-inactive { color: #64748b; }

        /* Print Specific CSS for PDF Generation */
        @media print {
            body, .app-container { background-color: white !important; }
            .print-hide { display: none !important; }
            .shadow-2xl, .shadow-xl, .shadow-lg, .shadow-sm { box-shadow: none !important; }
            .rounded-\[2rem\], .rounded-3xl, .rounded-2xl, .rounded-xl, .rounded-\[2\.5rem\] { border-radius: 0 !important; border: none !important;}
            main { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .h-\[75vh\] { height: auto !important; display: block !important; }
            .overflow-auto { overflow: visible !important; }
            .pb-24, .pb-32 { padding-bottom: 0 !important; }
            table { width: 100% !important; border: 1px solid #000 !important; font-size: 14px !important; }
            th, td { border: 1px solid #ccc !important; padding: 8px !important; color: #000 !important; font-size: 14px !important; }
            .text-\[9px\], .text-\[10px\], .text-xs, .text-sm { font-size: 14px !important; }
            .text-base { font-size: 16px !important; }
            @page { margin: 1cm; size: landscape; }
        }
    </style>

    <!-- Global Error Catcher -->
    <script>
        window.addEventListener('error', function(event) {
            const errEl = document.getElementById('loading-error');
            if(errEl) errEl.innerText = "Error: " + event.message;
        });
    </script>
</head>
<body>
    <!-- Fallback Loading Screen -->
    <div id="loading-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:99999; font-family:sans-serif;">
        <h2 style="margin-bottom:10px;">निसर्ग ॲप सुरू होत आहे...</h2>
        <p id="loading-error" style="color:#ff6b6b; text-align:center; padding:20px; font-family:monospace; font-size:12px;"></p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Permanent SVG Icon Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Home: "M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10",
                PlusCircle: "M12 8v8 M8 12h8 M22 12A10 10 0 1 1 2 12a10 10 0 0 1 20 0z",
                List: "M8 6h13 M8 12h13 M8 18h13 M3 6h.01 M3 12h.01 M3 18h.01",
                Settings: "M12.22 2h-.44a2 2 0 0 0-2 2 2 2 0 0 1-2 2 2 2 0 0 0-2 2 2 2 0 0 1-2 2 2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2 2 2 0 0 1 2 2 2 2 0 0 0 2 2 2 2 0 0 1 2 2 2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2 2 2 0 0 1 2-2 2 2 0 0 0 2-2 2 2 0 0 1 2-2 2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2 2 2 0 0 1-2-2 2 2 0 0 0-2-2 2 2 0 0 1-2-2 2 2 0 0 0-2-2z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
                Cloud: "M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z",
                CloudOff: "M18.83 18.83A4 4 0 0 0 18 10h-1.26A8 8 0 0 0 7.05 6.05 M4.34 4.34l15.32 15.32 M1 1l22 22",
                RefreshCw: "M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0 0 20.49 15",
                ArrowDown: "M12 5v14 M19 12l-7 7-7-7",
                ArrowUp: "M12 19V5 M5 12l7-7 7 7",
                Trash: "M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2",
                Edit: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
                Sheet: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M8 13h8 M8 17h8",
                ExternalLink: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6 M15 3h6v6 M10 14L21 3",
                Table: "M3 3h18v18H3z M3 9h18 M3 15h18 M9 3v18 M15 3v18",
                ArrowLeft: "M19 12H5 M12 19l-7-7 7-7",
                Check: "M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4L12 14.01l-3-3",
                Alert: "M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01",
                User: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
                Shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
                Database: "M12 6c4.418 0 8-1.79 8-4s-3.582-4-8-4-8 1.79-8 4 3.582 4 8 4z M4 6v6c0 2.21 3.582 4 8 4s8-1.79 8-4V6 M4 12v6c0 2.21 3.582 4 8 4s8-1.79 8-4v-6",
                Printer: "M6 9V2h12v7 M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2 M6 14h12v8H6z",
                Sparkles: "M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z",
                X: "M18 6 6 18 M6 6l12 12"
            };

            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={icons[name] || ""} />
                </svg>
            );
        };

        // --- Config ---
        const VIEW_SHEET_URL = "https://docs.google.com/spreadsheets/d/1clGHk-Bl1GlNqKg7ciGDpY7FOdJimSA0DguXU0lW5gw/edit?usp=sharing";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZGBVq9RmUoWaU3ZqNdxh-H5od50WSyz4CTaQoTdi1RDiFkIKOSRwGvhZ98prNVEXltA/exec";
        const appId = 'nisarg-resort-app-v2'; 
        
        // --- Utils ---
        const formatCurrency = (amount) => {
            const val = Number(amount) || 0;
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val);
        };
        
        const formatDateMarathi = (dateStr) => {
            if (!dateStr) return '—';
            try {
                const dateObj = new Date(dateStr);
                if (isNaN(dateObj.getTime())) return String(dateStr);
                const days = ['रविवार', 'सोमवार', 'मंगळवार', 'बुधवार', 'गुरुवार', 'शुक्रवार', 'शनिवार'];
                return `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${dateObj.getFullYear()} (${days[dateObj.getDay()]})`;
            } catch (e) { return String(dateStr); }
        };

        const transliterateToMarathi = async (text) => {
            if (!text) return text;
            const words = text.split(' ');
            const translatedWords = await Promise.all(words.map(async (word) => {
                if (!word.trim() || !/[a-zA-Z]/.test(word)) return word;
                try {
                    const res = await fetch(`https://inputtools.google.com/request?text=${word}&itc=mr-t-i0-und&num=1&cp=0&cs=1&ie=utf-8&oe=utf-8`);
                    const data = await res.json();
                    if (data[0] === 'SUCCESS') {
                        return data[1][0][1][0];
                    }
                } catch (e) {}
                return word;
            }));
            return translatedWords.join(' ');
        };

        // --- Components ---

        function ActionModal({ isOpen, onClose, onConfirm, title, message, type = 'success', stats }) {
            if (!isOpen) return null;
            const isConfirm = type === 'confirm';
            return (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md font-sans text-left animate-in">
                    <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm p-8 text-center border border-slate-100">
                        <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${type === 'success' ? 'bg-emerald-100 text-emerald-600' : isConfirm ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'}`}>
                            <Icon name={type === 'success' ? "Check" : isConfirm ? "Trash" : "Alert"} size={32} />
                        </div>
                        <h2 className="text-xl font-black text-slate-900 mb-2">{title || "सूचना"}</h2>
                        <div className="text-slate-500 font-bold mb-6 text-sm">
                            {message || ""}
                            {stats && (
                                <div className="mt-4 bg-slate-50 rounded-xl p-3 text-xs space-y-1 text-left border border-slate-100">
                                    <div className="flex justify-between"><span>एकूण नोंदी:</span> <span className="font-black text-slate-800">{stats.sheetCount}</span></div>
                                    <div className="flex justify-between pt-1 border-t border-slate-200 text-emerald-600"><span>नवीन जोडल्या:</span> <span className="font-black">+{stats.addedCount}</span></div>
                                </div>
                            )}
                        </div>
                        <div className="flex flex-col gap-2">
                            {isConfirm ? (
                                <><button onClick={onConfirm} className="w-full bg-red-600 text-white py-3 rounded-xl font-black uppercase active:scale-95">हो, हटवा</button>
                                <button onClick={onClose} className="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-black uppercase active:scale-95">रद्द करा</button></>
                            ) : (
                                <button onClick={onClose} className="w-full bg-slate-900 text-white py-3 rounded-xl font-black uppercase active:scale-95">ठीक आहे</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function InitSyncModal({ isOpen, onSync, onSkip, isPulling, dbStatus, txLoaded }) {
            if (!isOpen) return null;
            const isReady = (dbStatus === 'connected' && txLoaded) || dbStatus === 'offline';
            return (
                <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md font-sans text-left animate-in">
                    <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm p-8 text-center border border-slate-100 font-bold">
                        <div className="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-emerald-50 text-emerald-600">
                            <Icon name="RefreshCw" size={32} className={(isPulling || !isReady) ? "animate-spin" : ""} />
                        </div>
                        <h2 className="text-xl font-black text-slate-900 mb-2 font-sans">डेटा सिंक</h2>
                        <p className="text-slate-500 font-medium mb-6 text-sm font-sans">
                            क्लाउड स्प्रेडशीटमधील नवीन नोंदी ॲपमध्ये सिंक करायच्या आहेत का?
                        </p>
                        <div className="flex flex-col gap-3 font-sans">
                            <button onClick={onSync} disabled={isPulling || !isReady} className="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                                {isPulling ? 'सिंक होत आहे...' : (!isReady ? 'लोड होत आहे...' : 'सिंक करा')}
                            </button>
                            <button onClick={onSkip} disabled={isPulling} className="w-full bg-slate-100 text-slate-600 py-3.5 rounded-xl font-black uppercase tracking-widest active:scale-95 transition-all">
                                नंतर करा (SKIP)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function DashboardView({ stats, setActiveTab, dbStatus, openingBalanceConfig, sheetDirectUrl, transactions, onEdit, onDelete }) {
            const [showReceiptDetails, setShowReceiptDetails] = useState(false);
            const [isInsightLoading, setIsInsightLoading] = useState(false);
            const [insights, setInsights] = useState('');

            const receipts = transactions ? transactions.filter(t => t.type === 'receipt') : [];

            const generateInsights = async () => {
                setIsInsightLoading(true);
                const apiKey = "";
                try {
                    const txSummary = transactions.slice(0, 50).map(t => `${t.date}|${t.type==='receipt'?'जमा':'खर्च'}|${t.department||''}|${t.particulars}|₹${t.amount}`).join('\n');
                    const prompt = `खालील रिसॉर्टच्या ताज्या ५० व्यवहारांचे विश्लेषण करा आणि ३-४ वाक्यांत अचूक आर्थिक निष्कर्ष (Financial Insights) मराठीत द्या. सर्वात मोठा खर्च कुठे झाला आणि आर्थिक स्थिती कशी आहे ते सांगा:\n\n${txSummary}`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "You are a financial analyst. Answer in concise Marathi. Use bullet points. Do not use asterisks." }] }
                        })
                    });
                    const data = await res.json();
                    if (data.candidates && data.candidates.length > 0) {
                        setInsights(data.candidates[0].content.parts[0].text.replace(/\*\*/g, ''));
                    }
                } catch (err) {
                    setInsights("अहवाल बनवण्यात त्रुटी: " + err.message);
                }
                setIsInsightLoading(false);
            };

            return (
                <div className="space-y-6 pb-4 animate-in font-sans relative">
                    <div className={`w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-full text-[10px] font-black tracking-widest uppercase border ${dbStatus === 'connected' ? 'bg-emerald-50 text-emerald-700 border-emerald-100 shadow-sm' : dbStatus === 'offline' ? 'bg-amber-50 text-amber-700 border-amber-100' : 'bg-red-50 text-red-700 border-red-100 animate-pulse'}`}>
                        <Icon name={dbStatus === 'connected' ? "Cloud" : "CloudOff"} size={14} className={dbStatus === 'connecting' ? "animate-spin" : ""} />
                        {dbStatus === 'connected' ? 'सिस्टम सुरक्षित जोडलेली आहे' : dbStatus === 'offline' ? 'ऑफलाईन मोड (डेटा लोकली सेव्ह होईल)' : 'सर्व्हरशी संपर्क होत आहे...'}
                    </div>
                    
                    <div className="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200/50 font-sans">
                        <div className="p-6 border-b border-slate-50 text-left font-bold">
                            <h3 className="text-slate-400 text-[10px] uppercase tracking-widest mb-4 italic">आर्थिक स्थिती अहवाल</h3>
                            <div className="space-y-4 text-sm font-sans">
                                <div className="flex justify-between items-center"><span className="text-slate-500 italic">ओपनिंग बॅलन्स ({openingBalanceConfig.date || "..."})</span><span className="text-slate-900 font-black">{formatCurrency(openingBalanceConfig.amount)}</span></div>
                                <div className="flex justify-between items-center"><span className="text-slate-500 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> एकूण जमा</span><span className="text-emerald-600 font-black">{formatCurrency(stats.totalReceived)}</span></div>
                                <div className="flex justify-between items-center"><span className="text-slate-500 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-red-500"></div> एकूण खर्च</span><span className="text-red-600 font-black">{formatCurrency(stats.totalSpent)}</span></div>
                            </div>
                        </div>
                        <div className="bg-slate-900 p-6 flex justify-between items-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full -mr-16 -mt-16 blur-3xl opacity-50"></div>
                            <div className="relative z-10 text-left">
                                <p className="text-slate-400 text-[9px] uppercase tracking-widest font-black">NET BALANCE</p>
                                <h2 className="text-white text-3xl font-black mt-1 tracking-tight">{formatCurrency(stats.remainingAmount)}</h2>
                            </div>
                            <div className="bg-white/10 p-3 rounded-2xl border border-white/5 backdrop-blur-md relative z-10"><Icon name="Sheet" size={28} className="text-emerald-400" /></div>
                        </div>

                        {/* Receipt Details Button */}
                        <button 
                            onClick={() => setShowReceiptDetails(true)} 
                            className="w-full bg-emerald-50 hover:bg-emerald-100 text-emerald-700 p-4 font-black text-[11px] uppercase tracking-wider flex justify-between items-center transition-colors border-t border-emerald-100/50"
                        >
                            <div className="flex items-center gap-2">
                                <Icon name="ArrowDown" size={16} />
                                <span>कोणाकडून किती जमा झाले? (तपशील पहा)</span>
                            </div>
                            <Icon name="List" size={16} />
                        </button>
                    </div>

                    {/* ✨ Smart Insights Feature */}
                    <div className="bg-indigo-50 rounded-[2rem] border border-indigo-100 p-6 font-sans relative overflow-hidden print-hide shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-black text-indigo-900 text-sm flex items-center gap-2">
                                <div className="bg-indigo-200/50 p-1.5 rounded-lg text-indigo-600"><Icon name="Sparkles" size={16} /></div> 
                                स्मार्ट आर्थिक अहवाल
                            </h3>
                            <button onClick={generateInsights} disabled={isInsightLoading} className="bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 disabled:opacity-50 flex items-center gap-1.5 shadow-md">
                                {isInsightLoading ? <Icon name="RefreshCw" className="animate-spin" size={14}/> : '✨ अहवाल काढा'}
                            </button>
                        </div>
                        {insights ? (
                            <div className="bg-white p-5 rounded-2xl text-xs font-bold text-indigo-900 leading-relaxed whitespace-pre-wrap shadow-sm border border-indigo-100">
                                {insights}
                            </div>
                        ) : (
                            <p className="text-[11px] text-indigo-500 font-bold bg-white/60 p-4 rounded-xl border border-indigo-100/50">एका क्लिकवर तुमच्या सर्व खर्चाचे आणि जमा रकमेचे AI द्वारे विश्लेषण मिळवा.</p>
                        )}
                    </div>

                    {/* Receipt Details Modal */}
                    {showReceiptDetails && (
                        <div className="fixed inset-0 z-[300] flex items-end sm:items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
                            <div className="bg-white rounded-[2rem] w-full max-w-md max-h-[80vh] flex flex-col shadow-2xl animate-in">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="font-black text-lg text-slate-900 flex items-center gap-2">
                                        <Icon name="ArrowDown" className="text-emerald-500" size={20}/> जमा तपशील
                                    </h3>
                                    <button onClick={() => setShowReceiptDetails(false)} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 transition-colors"><Icon name="X" size={16}/></button>
                                </div>
                                <div className="overflow-y-auto p-4 space-y-3">
                                    {receipts.length > 0 ? receipts.map(r => (
                                        <div key={r.id} className="bg-slate-50 border border-slate-100 p-4 rounded-2xl flex justify-between items-center">
                                            <div className="text-left flex-1 pr-2 min-w-0">
                                                <div className="font-black text-slate-800 text-sm truncate">{r.receivedFrom || r.particulars}</div>
                                                {r.remarks && <div className="text-[10px] text-slate-500 font-bold mt-0.5">{r.remarks}</div>}
                                                <div className="text-[10px] text-slate-400 mt-1 font-bold">{formatDateMarathi(r.date)}</div>
                                            </div>
                                            <div className="flex flex-col items-end gap-2 shrink-0">
                                                <div className="font-black text-emerald-600 text-base text-right">+{formatCurrency(r.amount)}</div>
                                                <div className="flex gap-1.5">
                                                    <button onClick={() => { setShowReceiptDetails(false); onEdit(r); }} className="p-1.5 text-slate-400 hover:text-slate-900 bg-white border border-slate-200 rounded-lg shadow-sm"><Icon name="Edit" size={14} /></button>
                                                    <button onClick={() => { setShowReceiptDetails(false); onDelete(r); }} className="p-1.5 text-slate-400 hover:text-red-600 bg-white border border-slate-200 rounded-lg shadow-sm"><Icon name="Trash" size={14} /></button>
                                                </div>
                                            </div>
                                        </div>
                                    )) : <p className="text-center text-slate-400 font-bold py-8 text-sm">कोणतीही जमा नोंद उपलब्ध नाही.</p>}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-2 gap-4 pt-2">
                        <button onClick={() => setActiveTab('addExpense')} className="group bg-white border border-slate-200 p-6 rounded-[2rem] flex flex-col items-center gap-3 shadow-sm active:scale-95 transition-all">
                            <div className="bg-slate-50 text-slate-400 p-4 rounded-2xl group-hover:bg-red-500 group-hover:text-white transition-all shadow-inner"><Icon name="ArrowUp" size={24} /></div>
                            <span className="text-slate-900 font-black text-xs uppercase tracking-wider">खर्च नोंदवा</span>
                        </button>
                        <button onClick={() => setActiveTab('addReceipt')} className="group bg-white border border-slate-200 p-6 rounded-[2rem] flex flex-col items-center gap-3 shadow-sm active:scale-95 transition-all">
                            <div className="bg-slate-50 text-slate-400 p-4 rounded-2xl group-hover:bg-emerald-500 group-hover:text-white transition-all shadow-inner"><Icon name="ArrowDown" size={24} /></div>
                            <span className="text-slate-900 font-black text-xs uppercase tracking-wider">जमा नोंदवा</span>
                        </button>
                    </div>

                    <div className="space-y-3 pt-2">
                        <button onClick={() => setActiveTab('spreadsheet')} className="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] flex items-center justify-center gap-3 font-black text-xs uppercase tracking-widest shadow-xl active:scale-[0.98]">
                            <Icon name="Table" size={20} /> मॅट्रिक्स व्ह्यू उघडा
                        </button>
                        <button onClick={() => window.open(sheetDirectUrl, '_blank')} className="w-full bg-emerald-600 text-white py-5 rounded-[1.5rem] flex flex-col items-center justify-center gap-1 font-black text-xs uppercase tracking-widest shadow-xl active:scale-[0.98] border-b-4 border-emerald-800">
                            <div className="flex items-center gap-2"><Icon name="ExternalLink" size={20} /> थेट स्प्रेडशीट उघडा</div>
                            <span className="text-[8px] opacity-70 tracking-widest font-bold">(OPEN IN NEW TAB)</span>
                        </button>
                    </div>
                </div>
            );
        }

        // --- Main App Implementation ---
        function App() {
            const [user, setUser] = useState(null);
            const [dbStatus, setDbStatus] = useState('connecting'); 
            const [activeTab, setActiveTab] = useState('dashboard');
            const [openingBalanceConfig, setOpeningBalanceConfig] = useState({ amount: 5200, date: '2026-04-01' });
            const [transactions, setTransactions] = useState([]);
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [editingEntry, setEditingEntry] = useState(null);
            const [enteredBy, setEnteredBy] = useState('');
            const [isPulling, setIsPulling] = useState(false);
            const [txLoaded, setTxLoaded] = useState(false);
            const [modal, setModal] = useState({ open: false, title: '', message: '', type: 'success', stats: null });
            const [showInitSync, setShowInitSync] = useState(true);
            
            // Set Marathi Defaults
            const [departments, setDepartments] = useState(['निसर्ग विलाज', 'जेसीबी', 'ट्रॅक्टर', 'क्रेन']);
            const [machineryTypes, setMachineryTypes] = useState(['जेसीबी', 'ट्रॅक्टर', 'क्रेन']);
            const [newDeptName, setNewDeptName] = useState('');
            const [isNewMach, setIsNewMach] = useState(false);
            const [isTransliterating, setIsTransliterating] = useState(false);
            const [googleSheetUrl, setGoogleSheetUrl] = useState(SCRIPT_URL);
            
            const [tableFilters, setTableFilters] = useState({ date: '', voucherNo: '', name: '', particulars: '', department: '', remarks: '' });

            const [expenseForm, setExpenseForm] = useState({ date: new Date().toISOString().split('T')[0], voucherNo: '', particulars: '', department: 'निसर्ग विलाज', amount: '', sessions: [{ hours: '', minutes: '' }], remarks: '' });
            const [receiptForm, setReceiptForm] = useState({ date: new Date().toISOString().split('T')[0], receivedFrom: '', amount: '', remarks: '' });

            // ✨ AI Assistant States
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [aiQuery, setAiQuery] = useState('');
            const [aiResponse, setAiResponse] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);

            // ✨ Smart Entry States
            const [smartInput, setSmartInput] = useState('');
            const [isSmartLoading, setIsSmartLoading] = useState(false);

            useEffect(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) loader.style.display = 'none';
            }, []);

            useEffect(() => {
                try {
                    let fbConfig = {};
                    if (typeof __firebase_config !== 'undefined') {
                        fbConfig = JSON.parse(__firebase_config);
                    }

                    if (fbConfig && fbConfig.apiKey) {
                        if (!firebase.apps.length) firebase.initializeApp(fbConfig);
                        const auth = firebase.auth();
                        auth.onAuthStateChanged(async (u) => {
                            if (!u) {
                                try { await auth.signInAnonymously(); } catch (e) { 
                                    setDbStatus('offline'); 
                                    setTxLoaded(true);
                                }
                            } else {
                                setUser(u);
                            }
                        });
                    } else {
                        console.warn("Running in Portable Mode (No Firebase).");
                        setDbStatus('offline');
                        setTxLoaded(true);
                    }
                } catch (e) { 
                    console.error("Firebase Init Error", e);
                    setDbStatus('offline'); 
                    setTxLoaded(true);
                }
            }, []);

            useEffect(() => {
                if (!user || dbStatus === 'offline') return;
                
                try {
                    const db = firebase.firestore();
                    const unsubS = db.doc(`artifacts/${appId}/users/${user.uid}/appData/settings`).onSnapshot(snap => {
                        if (snap.exists) {
                            const d = snap.data();
                            if (d.departments) setDepartments(d.departments);
                            if (d.machineryTypes) setMachineryTypes(d.machineryTypes);
                            if (d.googleSheetUrl) setGoogleSheetUrl(d.googleSheetUrl);
                            if (d.enteredBy) setEnteredBy(d.enteredBy);
                            if (d.openingBalanceConfig) setOpeningBalanceConfig(d.openingBalanceConfig);
                        }
                        setDbStatus('connected');
                    }, () => setDbStatus('error'));

                    const unsubT = db.collection(`artifacts/${appId}/users/${user.uid}/transactions`).onSnapshot(snap => {
                        const txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        txs.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                        setTransactions(txs);
                        setTxLoaded(true);
                    }, () => { setDbStatus('error'); setTxLoaded(true); });

                    return () => { unsubS(); unsubT(); };
                } catch (err) {
                    console.error("Firestore Listeners Error", err);
                    setDbStatus('offline');
                    setTxLoaded(true);
                }
            }, [user, dbStatus]);

            const stats = useMemo(() => {
                let rec = 0, spent = 0;
                transactions.forEach(t => { if (t.type === 'receipt') rec += Number(t.amount || 0); else spent += Number(t.amount || 0); });
                return { totalReceived: rec, totalSpent: spent, remainingAmount: (Number(openingBalanceConfig.amount) || 0) + rec - spent };
            }, [transactions, openingBalanceConfig.amount]);

            const syncToSheet = async (data) => {
                if (!googleSheetUrl || !googleSheetUrl.includes('script.google.com')) return;
                try { await fetch(googleSheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ transactions: data }), headers: { 'Content-Type': 'text/plain' } }); } catch (e) {}
            };

            const pullFromSheet = async (silent = false) => {
                if (!googleSheetUrl || !googleSheetUrl.includes('script.google.com')) return;
                if (!silent) setIsPulling(true);
                try {
                    const res = await fetch(googleSheetUrl);
                    const d = await res.json();
                    if (d.status === 'success' && d.transactions) {
                        const createHash = (t) => {
                            let dt = t.date ? String(t.date) : '';
                            if (dt.includes('T')) dt = dt.split('T')[0];
                            return `${dt}|${String(t.voucherNo || '').trim()}|${String(t.particulars || '').trim().toLowerCase()}|${String(t.remarks || '').trim().toLowerCase()}|${Number(t.amount || 0).toFixed(2)}`;
                        };
                        
                        const sheetHashes = new Set(d.transactions.map(createHash));
                        const localHashes = new Set(transactions.map(createHash));

                        const toAdd = d.transactions.filter(t => !localHashes.has(createHash(t)));
                        const toDeleteLocal = transactions.filter(t => !sheetHashes.has(createHash(t)));
                        const toKeepLocal = transactions.filter(t => sheetHashes.has(createHash(t)));
                        
                        let added = 0;
                        let deleted = 0;

                        if (user && dbStatus === 'connected') {
                            const db = firebase.firestore();
                            const batch = db.batch();
                            
                            toDeleteLocal.forEach(t => {
                                if (t.id && !t.id.startsWith('sheet-') && !t.id.startsWith('local-')) {
                                    batch.delete(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`));
                                    deleted++;
                                }
                            });

                            toAdd.forEach(t => {
                                const docRef = db.collection(`artifacts/${appId}/users/${user.uid}/transactions`).doc();
                                batch.set(docRef, { ...t, createdAt: Date.now() - (added * 100) });
                                added++;
                            });

                            if (added > 0 || deleted > 0) {
                                await batch.commit();
                            }
                        } else {
                            const formattedAdd = toAdd.map((t, index) => ({
                                ...t,
                                id: `sheet-${Date.now()}-${index}`,
                                createdAt: Date.now() - (index * 100)
                            }));
                            
                            if (formattedAdd.length > 0 || toDeleteLocal.length > 0) {
                                setTransactions([...toKeepLocal, ...formattedAdd].sort((a,b) => b.createdAt - a.createdAt));
                            }
                            added = formattedAdd.length;
                            deleted = toDeleteLocal.length;
                        }

                        if (!silent) {
                            if (added > 0 || deleted > 0) {
                                setModal({ open: true, title: 'सिंक पूर्ण!', message: `स्प्रेडशीट सोबत सिंक झाले. (नवीन: ${added}, हटवले: ${deleted})`, type: 'success' });
                            } else {
                                setModal({ open: true, title: 'सिंक पूर्ण!', message: 'सर्व डेटा आधीच सिंक आहे.', type: 'success' });
                            }
                        }
                    }
                } catch (e) { console.error("Pull Error", e); } finally { setIsPulling(false); }
            };

            useEffect(() => {
                if (activeTab === 'spreadsheet' && txLoaded) pullFromSheet(true);
            }, [activeTab, txLoaded]);

            const handleInitialSync = async () => {
                await pullFromSheet(false);
                setShowInitSync(false);
            };

            const saveSettings = async (updates) => {
                if (!user || dbStatus === 'offline') return;
                try {
                    await firebase.firestore().doc(`artifacts/${appId}/users/${user.uid}/appData/settings`).set(updates, { merge: true });
                } catch(e) { console.error(e); }
            };

            const handleDeptNameChange = async (e) => {
                const val = e.target.value;
                setNewDeptName(val);
                if (val.endsWith(' ')) {
                    const tText = await transliterateToMarathi(val);
                    setNewDeptName((current) => current === val ? tText : current);
                }
            };

            const handleAddDept = async () => {
                if (newDeptName) {
                    setIsTransliterating(true);
                    const finalName = await transliterateToMarathi(newDeptName);
                    const trimmedName = finalName.trim();
                    await saveSettings({ 
                        departments: [...departments, trimmedName], 
                        machineryTypes: isNewMach ? [...machineryTypes, trimmedName] : machineryTypes 
                    }); 
                    
                    // Always update local state instantly for UI
                    if (!departments.includes(trimmedName)) setDepartments(prev => [...prev, trimmedName]);
                    if (isNewMach && !machineryTypes.includes(trimmedName)) setMachineryTypes(prev => [...prev, trimmedName]);
                    
                    setNewDeptName(''); 
                    setIsNewMach(false);
                    setIsTransliterating(false);
                }
            };

            const handleAskAiAssistant = async () => {
                if (!aiQuery.trim()) return;
                setIsAiLoading(true);
                const apiKey = ""; 
                try {
                    const txSummary = transactions.map(t => `${t.date} | ${t.type==='receipt'?'जमा':'खर्च'} | ${t.department || ''} | ${t.particulars} | ${t.remarks || ''} | ${formatCurrency(t.amount)}`).join('\n');
                    const prompt = `तुम्ही 'निसर्ग रिसॉर्ट' चे आर्थिक AI असिस्टंट आहात. खालील डेटा रिसॉर्टच्या सर्व जमा आणि खर्चाचा आहे:\n\n${txSummary}\n\nवापरकर्त्याचा प्रश्न: ${aiQuery}\n\nडेटाचे विश्लेषण करून प्रश्नाचे अचूक उत्तर मराठीत द्या. फक्त आवश्यक आणि अचूक माहिती द्या.`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "You are a helpful financial assistant. Always respond in Marathi. Be concise and accurate. Do not use special markdown characters like asterisks (**)." }] }
                        })
                    });
                    const data = await res.json();
                    if (data.candidates && data.candidates.length > 0) {
                        let text = data.candidates[0].content.parts[0].text;
                        setAiResponse(text.replace(/\*\*/g, ''));
                    } else {
                        setAiResponse("माफ करा, मला उत्तर शोधण्यात अडचण येत आहे.");
                    }
                } catch (err) {
                    setAiResponse("AI सर्व्हरशी संपर्क होऊ शकला नाही. त्रुटी: " + err.message);
                }
                setIsAiLoading(false);
            };

            const handleSmartEntry = async () => {
                if (!smartInput.trim()) return;
                setIsSmartLoading(true);
                const apiKey = "";
                try {
                    const prompt = `Extract transaction details from this Marathi/English text: "${smartInput}".
Current year is ${new Date().getFullYear()}, today is ${new Date().toISOString().split('T')[0]}.
Departments available: ${departments.join(', ')}.
Return ONLY a valid JSON object with keys:
- type (must be "expense" or "receipt")
- amount (number)
- particulars (string in Marathi)
- department (string from available list, if applicable, otherwise empty string)
- date (YYYY-MM-DD format)`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await res.json();
                    if (!data.candidates || data.candidates.length === 0) throw new Error("No response from AI");
                    const parsed = JSON.parse(data.candidates[0].content.parts[0].text);

                    if (parsed.type === 'receipt') {
                        setActiveTab('addReceipt');
                        setReceiptForm(prev => ({...prev, amount: parsed.amount || '', receivedFrom: parsed.particulars || '', date: parsed.date || prev.date}));
                    } else {
                        setActiveTab('addExpense');
                        setExpenseForm(prev => ({...prev, amount: parsed.amount || '', particulars: parsed.particulars || '', department: departments.includes(parsed.department) ? parsed.department : departments[0], date: parsed.date || prev.date}));
                    }
                    setSmartInput('');
                    setModal({ open: true, title: '✨ AI ने फॉर्म भरला!', message: 'कृपया माहिती तपासा आणि जतन करा.', type: 'success' });
                } catch(e) {
                    setModal({ open: true, title: 'त्रुटी', message: 'ऑटो-फिल अयशस्वी: ' + e.message, type: 'error' });
                }
                setIsSmartLoading(false);
            };

            const handleSaveEntry = async (e, type) => {
                e.preventDefault();
                
                let totalH = 0;
                let totalM = 0;
                if (type === 'expense' && expenseForm.sessions) {
                    const totalMins = expenseForm.sessions.reduce((acc, s) => acc + (Number(s.hours) || 0) * 60 + (Number(s.minutes) || 0), 0);
                    totalH = Math.floor(totalMins / 60);
                    totalM = totalMins % 60;
                }

                const entryData = type === 'expense' 
                    ? { ...expenseForm, type: 'expense', amount: Number(expenseForm.amount), enteredBy, hours: totalH, minutes: totalM, sessions: expenseForm.sessions, remarks: expenseForm.remarks } 
                    : { particulars: receiptForm.receivedFrom, receivedFrom: receiptForm.receivedFrom, amount: Number(receiptForm.amount), date: receiptForm.date, type: 'receipt', enteredBy, remarks: receiptForm.remarks };
                
                let currentTxs = [...transactions];

                if (user && dbStatus === 'connected') {
                    const db = firebase.firestore();
                    if (editingEntry && !editingEntry.id.startsWith('sheet-') && !editingEntry.id.startsWith('local-')) {
                        await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${editingEntry.id}`).update(entryData);
                        currentTxs = currentTxs.map(t => t.id === editingEntry.id ? { ...t, ...entryData } : t);
                    } else {
                        const docRef = await db.collection(`artifacts/${appId}/users/${user.uid}/transactions`).add({ ...entryData, createdAt: editingEntry ? editingEntry.createdAt : Date.now() });
                        if (editingEntry) {
                            currentTxs = currentTxs.map(t => t.id === editingEntry.id ? { ...t, id: docRef.id, ...entryData } : t);
                        } else {
                            currentTxs = [{ ...entryData, id: docRef.id, createdAt: Date.now() }, ...currentTxs];
                        }
                    }
                } else {
                    if (editingEntry) {
                        currentTxs = currentTxs.map(t => t.id === editingEntry.id ? { ...t, ...entryData } : t);
                    } else {
                        currentTxs = [{ ...entryData, id: `local-${Date.now()}`, createdAt: Date.now() }, ...currentTxs];
                    }
                    setTransactions(currentTxs);
                }
                
                syncToSheet(currentTxs);

                if (editingEntry) {
                     setModal({ open: true, title: 'बदल यशस्वी!', message: 'नोंद अपडेट झाली.', type: 'success' });
                }

                setEditingEntry(null);
                setExpenseForm({ date: new Date().toISOString().split('T')[0], voucherNo: '', particulars: '', department: departments[0] || '', amount: '', sessions: [{ hours: '', minutes: '' }], remarks: '' });
                setReceiptForm({ date: new Date().toISOString().split('T')[0], receivedFrom: '', amount: '', remarks: '' });
                setActiveTab('dashboard');
            };

            const toggleSelect = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id); else newSet.add(id);
                setSelectedIds(newSet);
            };

            const executeBulkDelete = async () => {
                let currentTxs = [...transactions];

                if (user && dbStatus === 'connected') {
                    const db = firebase.firestore();
                    const batch = db.batch();
                    selectedIds.forEach(id => {
                        if (id && !id.startsWith('sheet-') && !id.startsWith('local-')) {
                            batch.delete(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${id}`));
                        }
                    });
                    await batch.commit();
                } 
                
                currentTxs = currentTxs.filter(t => !selectedIds.has(t.id));
                setTransactions(currentTxs);
                syncToSheet(currentTxs);
                setSelectedIds(new Set());
                setModal({ open: false });
            };

            const filteredTxs = useMemo(() => {
                return transactions.filter(t => {
                    const matchDate = !tableFilters.date || (t.date && t.date.includes(tableFilters.date));
                    const matchVch = !tableFilters.voucherNo || String(t.voucherNo || '').toLowerCase().includes(tableFilters.voucherNo.toLowerCase());
                    const matchName = !tableFilters.name || String(t.enteredBy || 'Admin').toLowerCase().includes(tableFilters.name.toLowerCase());
                    const matchPart = !tableFilters.particulars || String(t.particulars || '').toLowerCase().includes(tableFilters.particulars.toLowerCase());
                    const matchDept = !tableFilters.department || String(t.department || '').toLowerCase().includes(tableFilters.department.toLowerCase());
                    const matchRemarks = !tableFilters.remarks || String(t.remarks || '').toLowerCase().includes(tableFilters.remarks.toLowerCase());
                    return matchDate && matchVch && matchName && matchPart && matchDept && matchRemarks;
                });
            }, [transactions, tableFilters]);

            const filteredStats = useMemo(() => {
                let rec = 0, spent = 0;
                filteredTxs.forEach(t => {
                    if (t.type === 'receipt') rec += Number(t.amount || 0);
                    else spent += Number(t.amount || 0);
                });
                return { rec, spent, net: rec - spent };
            }, [filteredTxs]);

            return (
                <div className="app-container flex flex-col font-sans overflow-x-hidden text-slate-900">
                    <InitSyncModal 
                        isOpen={showInitSync} 
                        onSync={handleInitialSync} 
                        onSkip={() => setShowInitSync(false)} 
                        isPulling={isPulling}
                        dbStatus={dbStatus}
                        txLoaded={txLoaded}
                    />

                    <ActionModal 
                        isOpen={modal.open} onClose={() => setModal({open: false})} onConfirm={executeBulkDelete}
                        title={modal.title} message={modal.message} type={modal.type} stats={modal.stats}
                    />

                    {/* Logo Header */}
                    <header className="bg-black text-white pt-8 pb-4 shadow-2xl sticky top-0 z-50 flex flex-col items-center border-b border-white/10 print-hide">
                        <img 
                            src="Nisarg Resort White Logo.jpg" 
                            alt="Nisarg Resort" 
                            className="h-24 w-auto object-contain px-4" 
                            onError={(e) => { e.target.style.display='none'; }}
                        />
                        <div className="h-1 w-20 bg-orange-600 rounded-full mt-3 opacity-80"></div>
                    </header>

                    <main className="flex-1 container mx-auto px-5 py-8 max-w-2xl text-left pb-32">
                        {activeTab !== 'dashboard' && activeTab !== 'spreadsheet' && (
                            <div className="mb-6 bg-slate-900 text-white rounded-[2rem] p-6 flex justify-between items-center shadow-2xl animate-in font-sans print-hide">
                                <div className="flex flex-col text-left">
                                    <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest">शिल्लक रक्कम</span>
                                    <div className="text-2xl font-black text-emerald-400 tracking-tight">{formatCurrency(stats.remainingAmount)}</div>
                                </div>
                                <div className="h-10 w-10 bg-white/10 rounded-xl flex items-center justify-center cursor-pointer active:scale-90" onClick={() => { setActiveTab('dashboard'); setEditingEntry(null); }}>
                                    <Icon name="ArrowLeft" size={20} className="text-white/60" />
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && <DashboardView 
                            stats={stats} 
                            setActiveTab={setActiveTab} 
                            dbStatus={dbStatus}

                                                    </td>
                                                </tr>
                                            ))}
                                            {filteredTxs.length === 0 && (
                                                <tr>
                                                    <td colSpan="8" className="p-8 text-center text-slate-400 font-bold">कोणत्याही नोंदी सापडल्या नाहीत.</td>
                                                </tr>
                                            )}
                                        </tbody>
                                        {/* PDF Only Footer */}
                                        <tfoot className="bg-slate-100 border-t-2 border-slate-300 hidden print:table-footer-group">
                                            <tr>
                                                <td colSpan="6" className="p-4 text-right font-black text-slate-700">
                                                    <span className="text-emerald-600 mr-4">एकूण जमा: {formatCurrency(filteredStats.rec)}</span>
                                                    <span className="text-red-600 mr-4">एकूण खर्च: {formatCurrency(filteredStats.spent)}</span>
                                                    निव्वळ रक्कम:
                                                </td>
                                                <td className={`p-4 text-right font-black text-base border-r border-slate-300 ${filteredStats.net >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>
                                                    {formatCurrency(filteredStats.net)}
                                                </td>
                                                <td className="print-hide"></td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                                
                                {/* App View Sticky Footer */}
                                <div className="bg-slate-100 border-t border-slate-300 p-4 shrink-0 print-hide flex flex-col sm:flex-row justify-between items-center gap-3 z-20 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                                    <div className="flex gap-3 w-full sm:w-auto justify-between">
                                        <span className="text-emerald-600 font-black text-xs sm:text-sm bg-white px-3 py-2 rounded-xl border border-slate-200 shadow-sm flex items-center gap-1 w-1/2 sm:w-auto justify-center">
                                            <Icon name="ArrowDown" size={14}/> जमा: {formatCurrency(filteredStats.rec)}
                                        </span>
                                        <span className="text-red-600 font-black text-xs sm:text-sm bg-white px-3 py-2 rounded-xl border border-slate-200 shadow-sm flex items-center gap-1 w-1/2 sm:w-auto justify-center">
                                            <Icon name="ArrowUp" size={14}/> खर्च: {formatCurrency(filteredStats.spent)}
                                        </span>
                                    </div>
                                    <div className="text-right flex items-center gap-3 bg-slate-900 px-4 py-2 rounded-xl shadow-lg w-full sm:w-auto justify-between sm:justify-end">
                                        <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">निव्वळ (Filtered):</span>
                                        <span className={`text-lg sm:text-xl font-black ${filteredStats.net >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                            {formatCurrency(filteredStats.net)}
                                        </span>
                                    </div>
                                </div>

                            </div>
                        )}
                        
                        {activeTab === 'settings' && (
                            <div className="space-y-8 pb-32 animate-in text-left font-sans">
                                {/* विभाग व्यवस्थापन */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                                    <h2 className="text-lg font-black text-slate-900 uppercase mb-6 border-b border-slate-50 pb-4 flex items-center gap-3 italic"><Icon name="Database" size={22} className="text-slate-400" /> विभाग व्यवस्थापन</h2>
                                    <div className="space-y-5">
                                        <div className="flex gap-3">
                                            <input type="text" className="flex-1 p-4 border border-slate-200 rounded-2xl text-sm font-bold bg-slate-50 focus:bg-white outline-none focus:ring-2 ring-slate-900" value={newDeptName} onChange={handleDeptNameChange} placeholder="नवीन विभाग (इंग्रजीत टाईप करा)" />
                                            <button onClick={handleAddDept} disabled={isTransliterating} className="bg-slate-900 text-white px-8 rounded-2xl font-black text-xs uppercase shadow-xl disabled:opacity-50">
                                                {isTransliterating ? 'प्रक्रिया...' : 'जोडा'}
                                            </button>
                                        </div>
                                        <label className="flex items-center gap-4 text-[10px] text-slate-600 font-black uppercase tracking-widest bg-slate-50 p-4 rounded-xl cursor-pointer border border-slate-100 hover:bg-slate-100 transition-colors"><input type="checkbox" checked={isNewMach} onChange={e => setIsNewMach(e.target.checked)} className="w-6 h-6 rounded-lg border-slate-300 text-slate-900 focus:ring-slate-900 shadow-sm" /> मशिनरी ट्रॅकिंग सुरू करा</label>
                                    </div>
                                    <div className="flex flex-wrap gap-2 mt-8">
                                        {departments.map(d => (
                                            <div key={d} className="bg-white border border-slate-200 px-4 py-3 rounded-2xl text-[10px] font-black flex items-center gap-5 uppercase tracking-tighter shadow-sm"><span className="opacity-70">{d}</span><button onClick={async () => { if(confirm('हा विभाग हटवायचा?')) await saveSettings({ departments: departments.filter(x => x !== d), machineryTypes: machineryTypes.filter(x => x !== d) }); setDepartments(prev => prev.filter(x => x !== d)); }} className="text-slate-300 hover:text-red-500 transition-colors"><Icon name="Trash" size={16} /></button></div>
                                        ))}
                                    </div>
                                </div>

                                {/* सिस्टम सेटिंग्ज */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                                    <h2 className="text-lg font-black text-slate-900 uppercase mb-6 border-b border-slate-50 pb-4 flex items-center gap-3 italic"><Icon name="Shield" size={22} className="text-slate-400" /> सिस्टम सेटिंग्ज</h2>
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 gap-5"><div className="space-y-2 text-left"><label className="text-[10px] font-black text-slate-400 uppercase ml-2 block">ओपनिंग तारीख</label><input type="date" className="w-full p-4 border border-slate-200 rounded-2xl text-sm font-bold bg-slate-50 outline-none focus:ring-2 ring-slate-900" value={openingBalanceConfig.date || ""} onChange={e => setOpeningBalanceConfig({...openingBalanceConfig, date: e.target.value})} /></div><div className="space-y-2 text-left"><label className="text-[10px] font-black text-slate-400 uppercase ml-2 block">ओपनिंग रक्कम</label><input type="text" inputMode="numeric" className="w-full p-4 border border-slate-200 rounded-2xl text-sm font-bold bg-slate-50 outline-none focus:ring-2 ring-slate-900" value={openingBalanceConfig.amount !== undefined && openingBalanceConfig.amount !== "" ? Number(openingBalanceConfig.amount).toLocaleString('en-IN') : ""} onChange={e => { const raw = e.target.value.replace(/[^0-9]/g, ''); setOpeningBalanceConfig({...openingBalanceConfig, amount: raw === '' ? '' : Number(raw)}); }} placeholder="0" /></div></div>
                                        <div className="space-y-2 text-left"><label className="text-[10px] font-black text-slate-400 uppercase ml-2 block">Google Script URL</label><input type="text" className="w-full p-4 border border-slate-200 rounded-2xl text-[10px] font-bold bg-slate-50 text-slate-500 outline-none font-mono" value={googleSheetUrl || ""} onChange={e => setGoogleSheetUrl(e.target.value)} /></div>
                                        <button onClick={async () => { await saveSettings({ openingBalanceConfig, googleSheetUrl }); setModal({ open: true, title: 'जतन!', message: 'सेटिंग अपडेट झाली.', type: 'success' }); }} className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-[11px] uppercase tracking-widest active:scale-95 shadow-2xl hover:bg-black">सर्व अपडेट करा</button>
                                    </div>
                                </div>

                                {/* Danger Zone */}
                                <div className="bg-red-50 p-7 rounded-[2.5rem] border border-red-100 text-left">
                                    <h2 className="text-base font-black text-red-900 uppercase tracking-widest mb-3 italic">Danger Zone</h2>
                                    <p className="text-[11px] text-red-700 font-bold mb-5 leading-relaxed">येथे क्लिक केल्यास सर्व व्यवहार आणि डेटा कायमचा हटवला जाईल.</p>
                                    <button onClick={async () => { 
                                        if (!confirm('सावधान! पूर्ण डेटा हटवल्यास परत मिळणार नाही. खात्री आहे?')) return; 
                                        if (user && dbStatus === 'connected') { 
                                            const db = firebase.firestore(); 
                                            const batch = db.batch(); 
                                            transactions.forEach(t => { 
                                                if(t.id && !t.id.startsWith('local-') && !t.id.startsWith('sheet-')) 
                                                    batch.delete(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`)); 
                                            }); 
                                            await batch.commit(); 
                                        } 
                                        setTransactions([]); 
                                        syncToSheet([]); 
                                        setModal({ open: true, title: 'रीसेट पूर्ण!', message: 'सर्व डेटा हटवण्यात आला आहे.', type: 'warning' }); 
                                    }} className="w-full bg-white border-2 border-red-600 text-red-600 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95 shadow-lg hover:bg-red-600 hover:text-white">पूर्ण डेटा हटवा (RESET)</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] max-w-md bg-white/95 border border-slate-200/50 flex justify-around p-3 rounded-[3.5rem] shadow-2xl z-[70] backdrop-blur-xl ring-1 ring-black/5 font-sans print-hide">
                        <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center w-16 transition-all ${activeTab==='dashboard'?'nav-active scale-105':'nav-inactive'}`}>
                            <div className={`${activeTab==='dashboard'?'bg-slate-950 text-white p-3 rounded-2xl shadow-xl':'p-2'}`}><Icon name="Home" size={24} /></div>
                            <span className="nav-label">मुख्य</span>
                        </button>
                        <button onClick={()=>setActiveTab('addExpense')} className={`flex flex-col items-center w-16 transition-all ${activeTab==='addExpense'||activeTab==='addReceipt'?'nav-active scale-105':'nav-inactive'}`}>
                            <div className={`${activeTab==='addExpense'||activeTab==='addReceipt'?'bg-slate-950 text-white p-3 rounded-2xl shadow-xl':'p-2'}`}><Icon name="PlusCircle" size={24} /></div>
                            <span className="nav-label">नोंदणी</span>
                        </button>
                        <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center w-16 transition-all ${activeTab==='history'?'nav-active scale-105':'nav-inactive'}`}>
                            <div className={`${activeTab==='history'?'bg-slate-950 text-white p-3 rounded-2xl shadow-xl':'p-2'}`}><Icon name="List" size={24} /></div>
                            <span className="nav-label">वही</span>
                        </button>
                        <button onClick={()=>setActiveTab('settings')} className={`flex flex-col items-center w-16 transition-all ${activeTab==='settings'?'nav-active scale-105':'nav-inactive'}`}>
                            <div className={`${activeTab==='settings'?'bg-slate-950 text-white p-3 rounded-2xl shadow-xl':'p-2'}`}><Icon name="Settings" size={24} /></div>
                            <span className="nav-label">सेटिंग</span>
                        </button>
                    </nav>

                    {/* --- Floating AI Button & Chat Window --- */}
                    <div className="fixed bottom-28 right-6 z-[80] flex flex-col items-end print-hide">
                        {isAiOpen && (
                            <div className="mb-4 w-[85vw] max-w-sm bg-gradient-to-br from-indigo-900 to-slate-900 rounded-[2rem] shadow-2xl border border-indigo-500/30 p-5 relative overflow-hidden animate-in slide-in-from-bottom-4">
                                <div className="absolute top-0 right-0 w-40 h-40 bg-indigo-500/20 rounded-full -mr-20 -mt-20 blur-3xl"></div>
                                <div className="relative z-10">
                                    <div className="flex items-center justify-between mb-4 border-b border-white/10 pb-3">
                                        <div className="flex items-center gap-2">
                                            <div className="bg-indigo-500/30 p-1.5 rounded-lg text-indigo-300">
                                                <Icon name="Sparkles" size={16} />
                                            </div>
                                            <h3 className="text-white font-black text-sm tracking-wide">निसर्ग AI <span className="text-[8px] font-bold bg-indigo-500 text-white px-2 py-0.5 rounded-full ml-1 relative -top-0.5">BETA</span></h3>
                                        </div>
                                    </div>
                                    <textarea 
                                        className="w-full bg-black/40 border border-indigo-500/30 rounded-xl p-3 text-xs text-white placeholder-indigo-300/50 outline-none focus:ring-2 focus:ring-indigo-500 resize-none font-bold font-sans"
                                        rows="3"
                                        placeholder="येथे विचारा (उदा. या महिन्यात ट्रॅक्टरवर किती खर्च झाला?)"
                                        value={aiQuery}
                                        onChange={e => setAiQuery(e.target.value)}
                                    ></textarea>
                                    <button 
                                        onClick={handleAskAiAssistant} 
                                        disabled={isAiLoading || !aiQuery.trim()}
                                        className="w-full mt-3 bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-xl font-black uppercase tracking-widest transition-all disabled:opacity-50 flex justify-center items-center gap-2 text-[10px]"
                                    >
                                        {isAiLoading ? <Icon name="RefreshCw" className="animate-spin" size={14} /> : 'माहिती काढा'}
                                    </button>

                                    {aiResponse && (
                                        <div className="mt-4 bg-white/10 border border-white/10 rounded-xl p-4 text-indigo-50 text-[11px] font-bold leading-relaxed whitespace-pre-wrap text-left max-h-48 overflow-y-auto">
                                            {aiResponse}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        
                        <button 
                            onClick={() => setIsAiOpen(!isAiOpen)}
                            className="bg-indigo-600 text-white p-4 rounded-full shadow-[0_10px_25px_-5px_rgba(79,70,229,0.5)] hover:bg-indigo-700 active:scale-90 transition-all border border-indigo-400/30 flex items-center justify-center"
                        >
                            <Icon name={isAiOpen ? "X" : "Sparkles"} size={26} />
                        </button>
                    </div>
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error("React render failed:", error);
            document.getElementById('loading-error').innerText = "Critical Error: " + error.message;
        }
    </script>
</body>
</html>
