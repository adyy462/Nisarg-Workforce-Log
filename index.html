<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisarg Workforce Log</title>
    <style>
        /* Minimalist Dark Theme to reduce eye strain */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        h2 { color: #81c784; text-align: center; }
        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
        select, input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            background-color: #2e7d32;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active { background-color: #1b5e20; transform: scale(0.98); }
        .log-entry {
            background: #252525;
            padding: 10px;
            border-left: 4px solid #81c784;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Nisarg Workforce Log</h2>
    
    <div class="card">
        <label>Select Category</label>
        <select id="category">
            <option value="Worker">Worker Attendance</option>
            <option value="JCB">JCB Work</option>
            <option value="Tractor">Tractor Log</option>
            <option value="Expense">General Expense</option>
        </select>

        <label>Name / Description</label>
        <input type="text" id="description" placeholder="e.g. Mahesh - Full Day or Diesel cost">

        <label>Amount / Hours</label>
        <input type="number" id="value" placeholder="Enter amount or hours">

        <button onclick="saveLog()">Save Entry</button>
    </div>

    <h3>Recent Activity</h3>
    <div id="logList"></div>
</div>

<script>
    function saveLog() {
        const category = document.getElementById('category').value;
        const desc = document.getElementById('description').value;
        const val = document.getElementById('value').value;
        const date = new Date().toLocaleString();

        if(!desc || !val) {
            alert("Please fill all fields");
            return;
        }

        const entry = { category, desc, val, date };
        
        // Save to Local Storage (phone memory)
        let logs = JSON.parse(localStorage.getItem('nisargLogs') || '[]');
        logs.unshift(entry);
        localStorage.setItem('nisargLogs', JSON.stringify(logs));

        // Clear inputs
        document.getElementById('description').value = '';
        document.getElementById('value').value = '';

        displayLogs();
    }

    function displayLogs() {
        const logList = document.getElementById('logList');
        const logs = JSON.parse(localStorage.getItem('nisargLogs') || '[]');
        
        logList.innerHTML = logs.map(log => `
            <div class="log-entry">
                <strong>${log.category}</strong>: ${log.desc}<br>
                Value: ${log.val} | <small>${log.date}</small>
            </div>
        `).join('');
    }

    // Load logs on startup
    displayLogs();
</script>

</body>
</html>
